<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asherel's Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #84d5f6ff;
  --white: #ffffffff;
  --accent: #fc5a18ff;
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Noto Sans', sans-serif;
  background: linear-gradient(to bottom, var(--sky), var(--white));
}

.viewport {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.row {
  display: flex;
  align-items: center;
  height: 95vh;
  width: 100%;
}

.row img {
  height: 95vh;
  aspect-ratio: 695.01 / 590.33;
  display: block;
  margin-left: 2.5vh;
  flex-shrink: 0;
}

.fill-right {
  background: var(--accent);
  display: flex;
  justify-content: center;      
  align-items: center;
  height: 100%;
  flex: 1;
  padding-top: 2.5vh;
  padding-bottom: 2.5vh;
  box-sizing: border-box;
  position: relative;
}

.text-gradient-container {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-end;        
  height: 100%;
  width: 75%;                   
  background: linear-gradient(to bottom, var(--sky), var(--white));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  padding-top: 0; /* JS will set this */
  padding-bottom: 2.5vh;
  box-sizing: border-box;
}

.text-gradient-container p {
  margin: 0;
  text-align: right;
  font-weight: 600;
  font-style: italic;
  line-height: 1.0;
  white-space: pre-line;
  width: 100%;
}

#bottom-text {
  margin-top: auto;
  line-height: 2; /* spacing between lines */
}

#bottom-text span {
  display: inline-block;
  position: relative;
  cursor: pointer;
  padding-left: 2.8em; /* space for the hand */
  transition: -webkit-text-fill-color 0.3s ease, color 0.3s ease;
}

#bottom-text span:hover {
  -webkit-text-fill-color: var(--sky);
  color: var(--sky);
}

#bottom-text span::before {
  content: url('https://github.com/asherelk/portfolio/raw/main/hand.webp');
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-40%) scale(0.4);
  transform-origin: left center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#bottom-text span:hover::before {
  opacity: 1;
}
</style>
</head>
<body>
<div class="viewport">
  <div class="row">
    <img src="https://github.com/asherelk/portfolio/raw/main/portfolioimage.webp" alt="Portfolio image">
    <div class="fill-right">
      <div class="text-gradient-container" id="text-container">
        <p id="portfolio-text">
Welcome to my portfolio.<br>
I'm Asherel, a designer combining natural inspiration with classic precision.<br>
Click below to see my work and learn more about my process.
        </p>

        <p id="bottom-text">
          <span>GRAPHIC DESIGN</span>
          <span>ABOUT ME</span>
          <span>CONTACT ME</span>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
function fitTextByLines(elementId, targetWidthPercent = 0.75, maxFont = 200) {
  const container = document.querySelector('.fill-right');
  const text = document.getElementById(elementId);
  const targetWidth = container.clientWidth * targetWidthPercent;

  let fontSize = maxFont; 
  text.style.fontSize = fontSize + 'px';

  const lines = text.innerHTML.split('<br>');
  const temp = document.createElement('span');
  document.body.appendChild(temp);
  temp.style.visibility = 'hidden';
  temp.style.position = 'absolute';
  temp.style.fontFamily = getComputedStyle(text).fontFamily;
  temp.style.fontWeight = getComputedStyle(text).fontWeight;
  temp.style.fontStyle = getComputedStyle(text).fontStyle;

  function anyLineTooWide() {
    return lines.some(line => {
      temp.style.fontSize = fontSize + 'px';
      temp.innerText = line.trim();
      return temp.offsetWidth > targetWidth;
    });
  }

  while (anyLineTooWide() && fontSize > 5) {
    fontSize -= 1;
  }

  document.body.removeChild(temp);
  text.style.fontSize = fontSize + 'px';
}

function fitBottomText() {
  const container = document.querySelector('.fill-right');
  const bottomText = document.getElementById('bottom-text');

  const targetWidth = container.clientWidth * 0.75;

  let fontSize = Math.floor(container.clientHeight * 0.06); 
  const maxFont = Math.floor(container.clientHeight * 0.12);
  bottomText.style.fontSize = fontSize + 'px';

  const lines = bottomText.querySelectorAll('span');
  const temp = document.createElement('span');
  document.body.appendChild(temp);
  temp.style.visibility = 'hidden';
  temp.style.position = 'absolute';
  temp.style.fontFamily = getComputedStyle(bottomText).fontFamily;
  temp.style.fontWeight = getComputedStyle(bottomText).fontWeight;
  temp.style.fontStyle = getComputedStyle(bottomText).fontStyle;

  lines.forEach(line => {
    let lineFontSize = fontSize;
    temp.style.fontSize = lineFontSize + 'px';
    temp.innerText = line.innerText.trim();
    while (temp.offsetWidth > targetWidth && lineFontSize > 5) {
      lineFontSize -= 1;
      temp.style.fontSize = lineFontSize + 'px';
    }
    line.style.fontSize = lineFontSize + 'px';
  });

  document.body.removeChild(temp);
}

// Align top text block so bottom sits at 213px down the image
function alignTextBottomToImage() {
  const image = document.querySelector('.row img');
  const textBlock = document.getElementById('portfolio-text');
  const container = document.getElementById('text-container');

  // Get image height
  const imageHeight = image.getBoundingClientRect().height;

  // Desired bottom of text as a percentage of image height
  const targetBottomPercent = 0.34
  const targetBottom = targetBottomPercent * imageHeight;

  // Height of the text block
  const textHeight = textBlock.getBoundingClientRect().height;

  // Set container padding-top proportionally
  container.style.paddingTop = (targetBottom - textHeight) + 'px';
}

function scaleTexts() {
  fitTextByLines('portfolio-text');
  fitBottomText();
  alignTextBottomToImage();
}

window.addEventListener('load', scaleTexts);
window.addEventListener('resize', scaleTexts);
</script>
</body>
</html>
